<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mine Sweeper</title>
    <style>
        table {
            border-collapse: collapse;
        }
        td {
            border: 1px solid #bbb;
            text-align: center;
            line-height: 20px;
            width: 20px;
            height: 20px;
            background: #888;
        }
        td.opened {
            background: white;
        }
        td.flag{
            background: red;
        }
        td.question {
            background: orange;
        }
        #timer {
            margin: 20px;
            margin-left: 90px;
            font-size: 20px;
            
        }
        #result {
            margin: 20px;
            margin-left: 70px;
            font-size: 20px;
            color: red;
        }
    </style>
</head>
<body>
<form id ="form" style="margin: 6px;">
    <input type="text" id="row" placeholder="Row" size="6">
    <input type="text" id="cell" placeholder="Cell" size="6">
    <input type="text" id="mine" placeholder="Mine" size="6">
    <button type="submit">Start</button>
</form>
<div id="timer">0 second</div>
<table id="table">
 <tbody></tbody>
</table>
<div id="result"></div>
<script>
    const $form = document.querySelector('#form');
    const $timer = document.querySelector('#timer');
    const $tbody = document.querySelector('#table tbody');
    const $result = document.querySelector('#result');
    let row;
    let cell;
    let mine;
    const CODE ={
        NORMAL: -1,
        QUESTION: -2,
        FLAG: -3,
        QUESTION_MINE: -4,
        FLAG_MINE: -5,
        MINE: -6,
        OPENED: 0, // If it is opened, it will be 0 or more. It will be the number of mines around it.
    }
    let data;
    let openedCount;
    let startTime;
    let interval;
    let isFirstClick = true;
    function onSubmit(event){
        event.preventDefault();
        row = parseInt(document.querySelector('#row').value);
        cell = parseInt(document.querySelector('#cell').value);
        mine = parseInt(document.querySelector('#mine').value);
        openedCount = 0;
        $result.textContent = '';
        $timer.textContent = '0second';
        normalCellFound = false;
        searched = null;
        firstClick = true;
        clearInterval(interval);
        $tbody.innerHTML = '';
        drawTable();
        startTime = new Date();
        interval = setInterval(() => {
        const time = Math.floor((new Date() - startTime) / 1000);
        $timer.textContent = `${time}seconds`;
        }, 1000);
    }

    $form.addEventListener('submit', onSubmit);

    function plantMine(){
        const candidate = Array(row * cell).fill().map((arr, i) => { // Create an array of numbers from 0 to row*cell-1
        return i;
        });

        const shuffle = []; // Create an array to store the randomly selected mine positions
        while(candidate.length > row * cell - mine){ //function to randomly select mine positions until the number of remaining candidates is equal to the number of non-mine cells
            const chosen = candidate.splice(Math.floor(Math.random() * candidate.length), 1)[0];
            shuffle.push(chosen);
        }

        const data = []; // Create a 2D array to represent the game board, initially filled with CODE.NORMAL and then place mines according to the randomly selected positions of CODE.MINE in shuffle

        for(let i = 0; i < row; i++){
            const rowData = [];
            data.push(rowData);
            for(let j = 0; j < cell; j++){
                rowData.push(CODE.NORMAL);
                }
            }
        for(let k = 0; k < shuffle.length; k++){
            const ver = Math.floor(shuffle[k] / cell);
            const hor = shuffle[k] % cell;
            data[ver][hor] = CODE.MINE;
        }
        return data;
    }
function onRightClick(event){
    event.preventDefault();
    const target = event.target;
    const rowIndex = target.parentNode.rowIndex;
    const cellIndex = target.cellIndex;
    const cellData = data[rowIndex][cellIndex];
    if (cellData === CODE.MINE){
        data[rowIndex][cellIndex] = CODE.QUESTION_MINE;
        target.className = 'question';
        target.textContent = '?';
    } else if (cellData === CODE.QUESTION_MINE){
        data[rowIndex][cellIndex] = CODE.FLAG_MINE;
        target.className = 'flag';
        target.textContent = '!';
    } else if (cellData === CODE.FLAG_MINE){
        data[rowIndex][cellIndex] = CODE.MINE;
        target.className = '';
        target.textContent = '';
    } else if (cellData === CODE.NORMAL){
        data[rowIndex][cellIndex] = CODE.QUESTION;
        target.className = 'question';
        target.textContent = '?';
    } else if (cellData === CODE.QUESTION){
        data[rowIndex][cellIndex] = CODE.FLAG;
        target.className = 'flag';
        target.textContent = '!';
    } else if (cellData === CODE.FLAG){
        data[rowIndex][cellIndex] = CODE.NORMAL;
        target.className = '';
        target.textContent = '';
    }
}
function countMine(rowIndex, cellIndex){
    const mines = [CODE.MINE, CODE.QUESTION_MINE, CODE.FLAG_MINE];
    let i = 0;
    mines.includes(data[rowIndex-1]?.[cellIndex - 1]) && i++;
    mines.includes(data[rowIndex-1]?.[cellIndex]) && i++;
    mines.includes(data[rowIndex-1]?.[cellIndex + 1]) && i++;
    mines.includes(data[rowIndex][cellIndex - 1]) && i++;
    mines.includes(data[rowIndex][cellIndex + 1]) && i++;
    mines.includes(data[rowIndex + 1]?.[cellIndex - 1]) && i++;
    mines.includes(data[rowIndex + 1]?.[cellIndex]) && i++;
    mines.includes(data[rowIndex + 1]?.[cellIndex + 1]) && i
    return i;
}
function open(rowIndex, cellIndex){
    if (data[rowIndex]?.[cellIndex] >= CODE.OPENED){
        return;
    }
    if (data[rowIndex]?.[cellIndex] !== CODE.NORMAL) {
        return;
    }
    const target = $tbody.children[rowIndex]?.children[cellIndex];
    if(!target){
        return;
    }
    const count = countMine(rowIndex, cellIndex);
    target.textContent = count || '';
    target.className = 'opened';
    data[rowIndex][cellIndex] = count;
    openedCount ++; // When you open a cell, the number of opened cells increases by 1.
    console.log(openedCount); // Check how many cells have been opened.
    if (openedCount === row * cell - mine){
        const time = (new Date() - startTime) / 1000;
        clearInterval(interval);
        $tbody.removeEventListener('contextmenu', onRightClick);
        $tbody.removeEventListener('click', onLeftClick);
        setTimeout(() => {
            alert(`Congratulations! Your time is ${time} seconds.`);
        }, 1000);
    }
    return count;
}
function openAround(rI,cI){
    const count = open(rI, cI);  
    if(count === 0){
        openAround(rI-1, cI-1);
        openAround(rI-1, cI);
        openAround(rI-1, cI+1);
        openAround(rI, cI-1);
        openAround(rI, cI+1);
        openAround(rI+1, cI-1);
        openAround(rI+1, cI);
        openAround(rI+1, cI+1);
        }
    }
function openAll(data){
    data.forEach((row, i) => {
        row.forEach((cell, j) => {
            if (cell === CODE.MINE){
                const target = $tbody.children[i]?.children[j];
                if(target){
                    target.textContent = 'X';
                    target.className = 'opened';
                }
            }
        });
    });
}
let nomalCellFound = false;
let searched;
let firstClick = true;

function transferMine(rI,cI){
    if (normalCellFound){
        return;
    }
    if (rI < 0 || rI >= row || cI < 0 || cI >= cell){
        return;
    }
    if(searched[rI][cI]){
        return;
    }
    if (data[rI][cI] === CODE.NORMAL){
        normalCellFound = true;
        data[rI][cI] = CODE.MINE;
    } else {
        searched[rI][cI] = true;
        transferMine(rI-1, cI-1);
        transferMine(rI-1, cI);
        transferMine(rI-1, cI+1);
        transferMine(rI, cI-1);
        transferMine(rI, cI+1);
        transferMine(rI+1, cI-1);
        transferMine(rI+1, cI);
        transferMine(rI+1, cI+1);
    }
}
function onLeftClick(event){
    const target = event.target;
    const rowIndex = target.parentNode.rowIndex;
    const cellIndex = target.cellIndex;
    let cellData = data[rowIndex][cellIndex];
    if (firstClick){
        firstClick = false;
        searched = Array(row).fill().map(() => []);
            if(cellData === CODE.MINE){
            transferMine(rowIndex, cellIndex);
            data[rowIndex][cellIndex] = CODE.NORMAL;
            cellData = CODE.NORMAL;
        }
    }   
    if (cellData === CODE.NORMAL){
        openAround(rowIndex, cellIndex);
    } else if (cellData === CODE.MINE){
        target.className = 'opened';
        openAll(data);
        clearInterval(interval);
        $result.textContent = 'Game Over!';
        $tbody.removeEventListener('contextmenu', onRightClick);
        $tbody.removeEventListener('click', onLeftClick);
        }
    }
function drawTable(){ //it is call just once. It creates the table structure and fills it with td elements. It also adds event listeners for right-click and left-click events on the tbody element.
    data = plantMine();
    data.forEach((row) => {
        const $tr = document.createElement('tr');
        row.forEach((cell) => {
            const $td = document.createElement('td');
            if (cell === CODE.MINE){
                $td.textContent = '';
            }
            $tr.appendChild($td);
        });
        $tbody.appendChild($tr);
        $tbody.addEventListener('contextmenu', onRightClick);
        $tbody.addEventListener('click', onLeftClick);
    });
}
</script>
</body>
</html>
