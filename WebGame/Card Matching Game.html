<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <title>Card Matching Game</title>
<style>
.card{
    display: inline-block;
    margin-right: 20px;
    margin-bottom: 20px;
    width: 80px;
    height: 100px;
    perspective: 140px;
}
.card-inner{
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.8s;
    transform-style: preserve-3d;
}
.card.flipped .card-inner{
    transform: rotateY(180deg);
}
.card-back{
    background: navy;
}
.card-front, .card-back{
    position: absolute;
    width: 100%;
    height: 100%;
    border: 1px solid black;
    backface-visibility: hidden;
}
.card-front{
    transform: rotateY(180deg);
}
</style>
</head>
<body>
<div id="wrapper"></div>
<script>
const $wrapper = document.querySelector('#wrapper');
const total = parseInt(prompt('Enter the number of cards (even number between 12 and 20)'));
const colors = ['red', 'orange', 'yellow', 'green', 'white', 'pink', 'blue', 'cyan', 'gray', 'black'];
let colorSlice = colors.slice(0, total / 2);
let colorCopy = colorSlice.concat(colors);
let shuffled = [];
let clicked = [];
let completed = [];
let clickable = false;
let startTime;
function shuffle(){
    for(;colorCopy.length > 0;){
        const randomIndex = Math.floor(Math.random() * colorCopy.length);
        shuffled = shuffled.concat(colorCopy.splice(randomIndex, 1));
    }
}
function createCard(i){
    const card = document.createElement('div');
    card.className = 'card';
    const cardInner = document.createElement('div');
    cardInner.className = 'card-inner';
    const cardBack = document.createElement('div');
    cardBack.className = 'card-back';
    const cardFront = document.createElement('div');
    cardFront.className = 'card-front';
    cardFront.style.backgroundColor = shuffled[i];
    cardInner.appendChild(cardBack);
    cardInner.appendChild(cardFront);
    card.appendChild(cardInner);
    return card;
}
function onClickCard(){
    if(!clickable || clicked.includes(this) || completed.includes(this)){
        return;
    }
    this.classList.toggle('flipped');
    clicked.push(this);
    if(clicked.length !== 2){;
        return;
    }
    const firstColor = clicked[0].querySelector('.card-front').style.backgroundColor;
    const secondColor = clicked[1].querySelector('.card-front').style.backgroundColor;
    if(firstColor === secondColor){
        completed.push(clicked[0]);
        completed.push(clicked[1]);
        clicked = [];
        if(completed.length !== total){
            return;
        }
        const endTime = new Date();
        setTimeout(() => {
            alert(`Congratulations! You have completed the game! ${(endTime - startTime) / 1000} seconds`);
            resetGame();
            }, 1000);
        return;
        }
    clickable = false;    
    setTimeout(() => {
        clicked[0].classList.remove('flipped');
        clicked[1].classList.remove('flipped');
        clicked = [];
        clickable = true;
        }, 500);
    }

function startGame(){
    shuffle();
    for(let i=0; i<total; i++){
        const card = createCard(i);
        card.addEventListener('click', onClickCard);
        wrapper.appendChild(card);
    }
    document.querySelectorAll('.card').forEach((card, index) => {
        setTimeout(() => {
            card.classList.add('flipped');
        }, 1000 + 100 * index);
     });
    setTimeout(() => {
        document.querySelectorAll('.card').forEach((card) => {
            card.classList.remove('flipped');
        });
        clickable = true;
        startTime = new Date();
    }, 5000);
}
function resetGame(){
    $wrapper.innerHTML = '';
    colorCopy = colorSlice.concat(colors);
    shuffled = [];
    completed = [];
    clickable = false;
    startGame();
}
startGame();

</script>
</body>
</html>
