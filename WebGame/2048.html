<html>
<head>
<meta charset="UTF-8">
<title>2048</title>
<style>
    #table {
        border-collapse: collapse;
        user-select: none;
    }
    #table td{
        border: 10px solid #bbada0;
        width: 116px;
        height: 128px;
        font-size: 50px;
        font-weight: bold;
        text-align: center;
    }
    #score {
        user-select: none;
        margin-top: 20px;
        font-size: 30px;
    }
    .color-2 {background: #eee4da; color: #776e65;}
    .color-4 {background: #eee1c9; color: #776e65;}
    .color-8 {background: #f3b27a; color: white;}
    .color-16 {background: #f69664; color: white;}
    .color-32 {background: #f77c5f; color: white;}
    .color-64 {background: #f75f3b; color: white;}
    .color-128 {background: #edd073; color: #777e65;}
    .color-256 {background: #edcc62; color: #776e65;}
    .color-512 {background: #edc950; color: #776e65;}
    .color-1024 {background: #edc53f; color: #776e65;}
    .color-2048 {background: #edc22e; color: #776e65;}
    div {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #back {
        margin-left: 20px;
        margin-top: 20px;
    }
    #score{
        margin-left: 20px;
    }
</style>
</head>
<body>
    <div>
        <table id ="table"></table>
        <div>
            <span id="score">0</span>
            <button id="back">Go Back</button>
        </div>
    </div>
<script>    
    const $table = document.getElementById('table');
    const $score = document.getElementById('score');
    const $container = document.querySelector('.container');
    const $back = document.getElementById('back');
    const history = [];
    let data = [];

    $back.addEventListener('click', () => {
        const prevData = history.pop();
        if(!prevData){
            return;
        }
        $score.textContent = prevData.score;
        data = prevData.table;
        draw();
    });

    function startGame(){
        const $fragment = document.createDocumentFragment();
        [1,2,3,4].forEach(function(){
            const rowData = [];
            data.push(rowData);
            const $tr = document.createElement('tr');
            [1,2,3,4].forEach(function(){
                rowData.push(0);
                const $td = document.createElement('td');
                $tr.appendChild($td);
            });
            $fragment.appendChild($tr);
        });
        $table.appendChild($fragment);
        put2ToRandomCell();
        draw();
    }
    function put2ToRandomCell(){
        const emptyCells = [];
        data.forEach(function(rowData, i){
            rowData.forEach(function(cellData, j){
                if(!cellData){
                    emptyCells.push([i,j]);
                }
            });
        });
        const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        data[randomCell[0]][randomCell[1]] = 2;
    }
    function draw(){
        data.forEach((rowData, i) => {
            rowData.forEach(function(cellData, j){
                const $target = $table.children[i].children[j];
                if(cellData > 0){
                    $target.textContent = cellData;
                    $target.className = 'color-' + cellData;
                } else {
                    $target.textContent = '';
                    $target.className = '';
                }
            });
        });
    }
    function checkGameOver() {
        if (data.flat().includes(0)) {
         return false;
        }
        for (let i = 0; i < 4; i++) {
             for (let j = 0; j < 4; j++) {
                const current = data[i][j];  
                if (j < 3 && current === data[i][j + 1]) {
                    return false;
                }

                if (i < 3 && current === data[i + 1][j]) {
                    return false;
                }
            }
        }
        return true;
    }
    startGame();
    function moveCells(direction){
        const snapshot = {
            table: JSON.parse(JSON.stringify(data)),
            score: $score.textContent,
        };

        switch(direction){
            case'left': {
                const newData = [[],[],[],[]];
                data.forEach((rowData, i) => {
                    rowData.forEach((cellData, j) => {
                        if(cellData){
                            const currentRow = newData[i];
                            const prevData = currentRow.at(-1);
                            if(prevData === cellData){
                                const score = parseInt($score.textContent);
                                $score.textContent = score + currentRow.at(-1) * 2;
                                currentRow[currentRow.length - 1] *= -2;
                            } else {
                            newData[i].push(cellData);
                        }
                    }
                    });
                });
                console.log(newData);
                [1,2,3,4].forEach((rowData, i) => {
                    [1,2,3,4].forEach((cellData, j) => {
                        data[i][j] = Math.abs(newData[i][j]) || 0;
                    });
                });             
            break;
            }
            case 'right' :{
                const newData = [[],[],[],[]];
                data.forEach((rowData, i) => {
                    rowData.forEach((cellData, j) => {
                        if(rowData[3-j]){
                            const currentRow = newData[i];
                            const prevData = currentRow.at(-1);
                            if(prevData === rowData[3-j]){
                                const score = parseInt($score.textContent);
                                $score.textContent = score + currentRow.at(-1) * 2;
                                currentRow[currentRow.length - 1] *= -2;
                            } else {
                            newData[i].push(rowData[3-j]);
                        }
                    }
                    });
                });
                console.log(newData);
                [1,2,3,4].forEach((rowData, i) => {
                    [1,2,3,4].forEach((cellData, j) => {
                        data[i][3-j] = Math.abs(newData[i][j]) || 0;
                    });
                });
            }
                break;
            case 'up' :
                const newData = [[],[],[],[]];
                data.forEach((rowData, i) => {
                    rowData.forEach((cellData, j) => {
                        if(cellData){
                            const currentRow = newData[j];
                            const prevData = currentRow.at(-1);
                            if(prevData === cellData){
                                const score = parseInt($score.textContent);
                                $score.textContent = score + currentRow.at(-1) * 2;
                                currentRow[currentRow.length - 1] *= -2;
                            } else {
                            newData[j].push(cellData);
                        }
                    }
                    });
                });
                console.log(newData);
                [1,2,3,4].forEach((rowData, i) => {
                    [1,2,3,4].forEach((cellData, j) => {
                        data[j][i] = Math.abs(newData[i][j]) || 0;
                    });
                });
                break;
            case 'down' :
                const newData2 = [[],[],[],[]];
                data.forEach((rowData, i) => {
                    rowData.forEach((cellData, j) => {
                        if(data[3-i][j]){
                            const currentRow = newData2[j];
                            const prevData = currentRow.at(-1);
                            if(prevData === data[3-i][j]){
                                const score = parseInt($score.textContent);
                                $score.textContent = score + currentRow.at(-1) * 2;
                                currentRow[currentRow.length - 1] *= -2;
                            } else {
                            newData2[j].push(data[3-i][j]);
                            }
                        }           
                    });
                });
                console.log(newData2);
                [1,2,3,4].forEach((rowData, i) => {
                    [1,2,3,4].forEach((cellData, j) => {
                        data[3-j][i] = Math.abs(newData2[i][j]) || 0;
                    });
                });
                break;
        }
        const isChanged = JSON.stringify(snapshot.table) !== JSON.stringify(data);

        if(isChanged){
            history.push(snapshot);
        } 
        if(data.flat().includes(2048)){
            draw();
            setTimeout(() => {
                alert('You Win!');
            }, 100);
        } else if(checkGameOver()){
            alert(`Game Over! ${$score.textContent}Points`);
        } else{
        put2ToRandomCell();
        draw();
        }
    }
    window.addEventListener('keyup', (event) => {
        if(event.key === 'ArrowUp'){
            moveCells('up');
        } else if(event.key === 'ArrowDown'){
            moveCells('down');
        } else if(event.key === 'ArrowLeft'){
            moveCells('left');
        } else if(event.key === 'ArrowRight'){
            moveCells('right');
        }
    });

    let startCoord;

    window.addEventListener('mousedown', (event) => {
        startCoord = [event.clientX, event.clientY];
    })
    window.addEventListener('mouseup', (event) => {
        const endCoord = [event.clientX, event.clientY];
        const diffX = endCoord[0] - startCoord[0];
        const diffY = endCoord[1] - startCoord[1];
        const threshold = 10;
        if(Math.abs(diffX) < threshold && Math.abs(diffY) < threshold){
            return;
        }
        if(Math.abs(diffX) > Math.abs(diffY)){
            if(diffX > 0){
                moveCells('right');
            } else {
                moveCells('left');
            }
        } else {
            if(diffY > 0){
                moveCells('down');
            } else {
                moveCells('up');
            }
        }
    });
</script>
</body>
</html>
